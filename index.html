<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseBoard — Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      color: #E5E5EA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .brand-dot {
      width: 48px;
      height: 48px;
      background: #FF5236;
      border-radius: 12px;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 15px;
      color: #8E8E93;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 16px 24px;
      background: #000000;
      border: 1px solid #2C2C2E;
      border-radius: 12px;
      color: #FFFFFF;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: border-color 0.2s;
    }
    .links a:hover {
      border-color: #FF5236;
    }
    .links a span {
      display: block;
      font-size: 13px;
      color: #636366;
      font-weight: 400;
      margin-top: 4px;
    }
    .footer {
      margin-top: 60px;
      font-size: 13px;
      color: #636366;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-dot"></div>
    <h1>PulseBoard</h1>
    <p class="tagline">Real-time intelligence dashboard for the Philippines</p>

    <div class="links">
      <a href="privacy-policy.html">
        Privacy Policy
        <span>How we handle your data</span>
      </a>
      <a href="terms-of-service.html">
        Terms of Service
        <span>Rules for using PulseBoard</span>
      </a>
    </div>

    <div class="footer">
      <p>© 2026 PulseBoard. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
